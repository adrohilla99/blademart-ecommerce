services:
  - type: web
    name: blademart-api
    runtime: node
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false   # Set in Render dashboard — Neon PostgreSQL connection string
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: STRIPE_SECRET_KEY
        sync: false   # Set in Render dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false   # Set in Render dashboard after configuring webhook
      - key: CLIENT_URL
        sync: false   # Set to your Vercel frontend URL
    healthCheckPath: /api/health
    autoDeploy: true
